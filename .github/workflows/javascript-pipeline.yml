name: JavaScript Docker Pipeline

on:
  workflow_call:
    inputs:
      image_name:
        description: Image name without the registry or owner.
        required: true
        type: string
      registry:
        description: Container registry to publish to.
        required: false
        type: string
        default: ghcr.io
      context:
        description: Docker build context.
        required: false
        type: string
        default: .
      dockerfile:
        description: Dockerfile path.
        required: false
        type: string
        default: Dockerfile
      platforms:
        description: Comma-separated target platforms.
        required: false
        type: string
        default: linux/amd64,linux/arm64
      scout:
        description: Run Docker Scout CVE scanning.
        required: false
        type: boolean
        default: true
      scout_fail:
        description: Fail the workflow when Docker Scout finds matching CVEs.
        required: false
        type: boolean
        default: false
      sbom:
        description: Generate an SPDX SBOM with Docker Scout.
        required: false
        type: boolean
        default: true
      attest:
        description: Generate a GitHub artifact attestation for pushed images.
        required: false
        type: boolean
        default: true
    secrets:
      dockerhub_username:
        required: false
      dockerhub_token:
        required: false

jobs:
  dependency-review:
    uses: meyersa/iac-ci/.github/workflows/security-dependency-review.yml@main

  codeql:
    uses: meyersa/iac-ci/.github/workflows/security-codeql-javascript.yml@main

  docker:
    needs:
      - dependency-review
      - codeql
    uses: meyersa/iac-ci/.github/workflows/build-docker-image.yml@main
    with:
      image_name: ${{ inputs.image_name }}
      registry: ${{ inputs.registry }}
      context: ${{ inputs.context }}
      dockerfile: ${{ inputs.dockerfile }}
      platforms: ${{ inputs.platforms }}
      push: ${{ github.event_name != 'pull_request' }}
      scout: ${{ inputs.scout && github.event_name != 'pull_request' }}
      scout_fail: ${{ inputs.scout_fail }}
      sbom: ${{ inputs.sbom && github.event_name != 'pull_request' }}
      attest: ${{ inputs.attest }}
    secrets:
      dockerhub_username: ${{ secrets.dockerhub_username }}
      dockerhub_token: ${{ secrets.dockerhub_token }}
