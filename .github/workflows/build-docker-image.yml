name: Build Docker Image

on:
  workflow_call:
    inputs:
      image_name:
        description: Image name without the registry or owner.
        required: true
        type: string
      registry:
        description: Container registry to publish to.
        required: false
        type: string
        default: ghcr.io
      context:
        description: Docker build context.
        required: false
        type: string
        default: .
      dockerfile:
        description: Dockerfile path.
        required: false
        type: string
        default: Dockerfile
      platforms:
        description: Comma-separated target platforms.
        required: false
        type: string
        default: linux/amd64,linux/arm64
      push:
        description: Push the image to the registry.
        required: false
        type: boolean
        default: true
      scout:
        description: Run Docker Scout CVE scanning.
        required: false
        type: boolean
        default: true
      scout_fail_on:
        description: Comma-separated severities to include in the Scout CVE report.
        required: false
        type: string
        default: critical,high
      scout_fail:
        description: Fail the workflow when Docker Scout finds matching CVEs.
        required: false
        type: boolean
        default: false
      sbom:
        description: Generate an SPDX SBOM with Docker Scout.
        required: false
        type: boolean
        default: true
      attest:
        description: Generate a GitHub artifact attestation for pushed images.
        required: false
        type: boolean
        default: true
    secrets:
      dockerhub_username:
        description: Optional Docker Hub username for Docker Scout.
        required: false
      dockerhub_token:
        description: Optional Docker Hub token for Docker Scout.
        required: false

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      attestations: write
      contents: read
      id-token: write
      packages: write
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to container registry
        if: ${{ inputs.push }}
        uses: docker/login-action@v3
        with:
          registry: ${{ inputs.registry }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ inputs.registry }}/${{ github.repository_owner }}/${{ inputs.image_name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch,enable=${{ !github.event.repository.default_branch || github.ref_name != github.event.repository.default_branch }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          platforms: ${{ inputs.platforms }}
          push: ${{ inputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Docker Scout CVE scan
        id: docker-scout-cves
        if: ${{ inputs.scout }}
        uses: docker/scout-action@v1
        with:
          command: cves,recommendations
          image: ${{ fromJSON(steps.meta.outputs.json).tags[0] }}
          only-severities: ${{ inputs.scout_fail_on }}
          only-fixed: true
          exit-code: ${{ inputs.scout_fail }}
          sarif-file: docker-scout.sarif.json
          summary: true
          dockerhub-user: ${{ secrets.dockerhub_username }}
          dockerhub-password: ${{ secrets.dockerhub_token }}

      - name: Upload Docker Scout SARIF
        if: ${{ inputs.scout }}
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: docker-scout.sarif.json

      - name: Generate SBOM
        if: ${{ inputs.sbom }}
        uses: docker/scout-action@v1
        with:
          command: sbom
          image: ${{ fromJSON(steps.meta.outputs.json).tags[0] }}
          format: spdx
          output: sbom.spdx.json
          summary: true
          dockerhub-user: ${{ secrets.dockerhub_username }}
          dockerhub-password: ${{ secrets.dockerhub_token }}

      - name: Upload SBOM artifact
        if: ${{ inputs.sbom }}
        uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: sbom.spdx.json
          if-no-files-found: error

      - name: Generate artifact attestation
        if: ${{ inputs.attest && inputs.push }}
        uses: actions/attest@v4
        with:
          subject-name: ${{ inputs.registry }}/${{ github.repository_owner }}/${{ inputs.image_name }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
