name: Dependency Review

on:
  workflow_call:
    inputs:
      fail_on_severity:
        description: Minimum vulnerability severity that fails the dependency review.
        required: false
        type: string
        default: high

jobs:
  dependency-review:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout code
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/checkout@v4

      - name: Dependency review
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: ${{ inputs.fail_on_severity }}

      - name: Skip dependency review
        if: ${{ github.event_name != 'pull_request' }}
        run: echo "Dependency review only runs on pull requests."
